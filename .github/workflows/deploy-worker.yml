name: Deploy Worker to Cloudflare

on:
  push:
    branches: [main]
    paths:
      - 'project/worker/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    name: Deploy Cloudflare Worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy Worker
        working-directory: project/worker
        run: npx wrangler@3.60.3 deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set secrets
        working-directory: project/worker
        run: |
          echo "${{ secrets.REMOVE_BG_API_KEY }}" | npx wrangler@3.60.3 secret put REMOVE_BG_API_KEY
          echo "${{ secrets.GOOGLE_CLIENT_ID }}"     | npx wrangler@3.60.3 secret put GOOGLE_CLIENT_ID
          echo "${{ secrets.GOOGLE_CLIENT_SECRET }}" | npx wrangler@3.60.3 secret put GOOGLE_CLIENT_SECRET
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
