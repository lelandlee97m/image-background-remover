compatibility_date = "2024-09-23"

[vars]
OAUTH_REDIRECT_URI = "https://imagebackgroundremover88ic.shop/api/auth/callback"

# D1 database for session storage
[[d1_databases]]
binding = "DB"
database_name = "auth-sessions"
database_id = "07d3fb17-7e47-4c75-8546-2070b6dc47cb"

# API keys and OAuth credentials via GitHub Actions secrets:
# - REMOVE_BG_API_KEY
# - GOOGLE_CLIENT_ID
# - GOOGLE_CLIENT_SECRET
# Local dev: npx wrangler secret put <NAME>
