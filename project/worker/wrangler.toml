name = "image-background-remover"
main = "index.ts"
compatibility_date = "2024-09-23"

# D1 database for session storage
# Replace <DATABASE_ID> with your actual D1 database ID after creation
[[d1_databases]]
binding = "DB"
database_name = "auth-sessions"
database_id = "<DATABASE_ID>"

# API keys and OAuth credentials via GitHub Actions secrets:
# - REMOVE_BG_API_KEY
# - GOOGLE_CLIENT_ID
# - GOOGLE_CLIENT_SECRET
# Local dev: npx wrangler secret put <NAME>
